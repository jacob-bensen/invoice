spring:
  application:
    name: invoiceflow

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/invoiceflow}
    username: ${DATABASE_USER:invoiceflow}
    password: ${DATABASE_PASSWORD:invoiceflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-256-bit-secret-in-production-env}
    expiration-ms: 86400000   # 24h

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    price-id-solo: ${STRIPE_PRICE_SOLO:}
    price-id-pro: ${STRIPE_PRICE_PRO:}
    price-id-agency: ${STRIPE_PRICE_AGENCY:}

  from-email: ${FROM_EMAIL:noreply@invoiceflow.app}
  base-url: ${BASE_URL:http://localhost:8080}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
